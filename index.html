<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KAS HAFIZASI ✨</title>
<meta name="description" content="Klavye ile oynanan eğlenceli bir yazma oyunu">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0f0c29;
    --bg2:#302b63;
    --bg3:#24243e;
    --accent:#f7971e;
    --accent2:#ffd200;
    --pink:#ff6b9d;
    --pink-soft:#ff9bc0;
    --purple:#c471ed;
    --purple-soft:#d4a0f5;
    --mint:#56d9b6;
    --blue:#6ec6ff;
    --text:#fff;
    --text-dim:rgba(255,255,255,0.5);
    --miss:#ff4757;
    --success:#2ed573;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%; overflow:hidden;
    font-family:'Nunito', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
  }
  #stage{
    position:relative; width:100%; height:100vh;
  }
  canvas{position:absolute; top:0; left:0; display:block;}

  /* Soft warm overlay glow */
  #warmglow{
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none;
    background: radial-gradient(ellipse at 30% 20%, rgba(247,151,30,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(196,113,237,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(255,107,157,0.05) 0%, transparent 50%);
  }

  /* Soft vignette */
  #vignette{
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,0.35) 100%);
  }

  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 28px; pointer-events:none;
  }
  .hud-box{
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:14px;
    padding:8px 18px;
    color:var(--text);
    font-size:12px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .hud-box .icon{ font-size:16px; }
  .hud-box .value{ color:var(--accent2); }

  #combo-wrap{
    position:absolute; top:80px; left:50%; transform:translateX(-50%);
    pointer-events:none; text-align:center;
  }
  #combo{
    font-size:14px; font-weight:800; letter-spacing:3px;
    background: linear-gradient(135deg, var(--accent), var(--pink), var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter: drop-shadow(0 0 12px rgba(255,107,157,0.4));
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  #combo.pop{ transform:scale(1.3); }

  #log{
    position:absolute; bottom:70px; left:28px;
    color:var(--text-dim); font-size:12px; line-height:1.8;
    max-height:130px; overflow:hidden; pointer-events:none;
    font-family:'JetBrains Mono', monospace;
  }
  #log div{
    opacity:0; animation:logFadeIn 0.3s ease forwards;
  }
  @keyframes logFadeIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  #log span.hit{color:var(--mint); text-shadow:0 0 8px rgba(86,217,182,0.3);}
  #log span.miss{color:var(--miss); text-shadow:0 0 8px rgba(255,71,87,0.3);}

  #footer{
    position:absolute; bottom:22px; left:0; right:0;
    text-align:center; font-size:12px;
    pointer-events:none; font-weight:600;
    background: linear-gradient(90deg, var(--purple-soft), var(--pink-soft), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:1px;
  }

  /* Streak fire indicator */
  #streak-fire{
    position:absolute; top:108px; left:50%; transform:translateX(-50%);
    font-size:28px; pointer-events:none;
    opacity:0; transition: opacity 0.3s ease;
    filter: drop-shadow(0 0 8px rgba(255,151,30,0.5));
  }
  #streak-fire.show{ opacity:1; animation: fireWiggle 0.5s ease infinite; }
  @keyframes fireWiggle{
    0%,100%{transform:translateX(-50%) rotate(-3deg) scale(1);}
    50%{transform:translateX(-50%) rotate(3deg) scale(1.1);}
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="warmglow"></div>
  <div id="vignette"></div>
  <div id="hud">
    <div class="hud-box"><span class="icon">⚡</span> TEMPO <span class="value" id="tempo">100%</span></div>
    <div class="hud-box"><span class="icon">✨</span> KAS HAFIZASI</div>
    <div class="hud-box"><span class="icon">🎯</span> ACC <span class="value" id="acc">—</span></div>
  </div>
  <div id="combo-wrap"><div id="combo">COMBO 0</div></div>
  <div id="streak-fire">🔥</div>
  <div id="log"></div>
  <div id="footer">✦ kelimeyi bar bitmeden yaz ✦</div>
</div>

<script>
/* ============================================================
   KAS HAFIZASI — Cute & Warm Redesign
   Same core mechanics, completely new visual identity:
   warm gradients, floating particles, sparkles, confetti,
   soft keycap styling, and juicy animations.
   ============================================================ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W/2; CY = H/2;
}
window.addEventListener('resize', resize);
resize();

// ---------- Audio ----------
let audioCtx = null;
function ensureAudio(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
let noiseBuffer = null;
function getNoiseBuffer(){
  ensureAudio();
  if (noiseBuffer) return noiseBuffer;
  const size = audioCtx.sampleRate * 0.08;
  noiseBuffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i=0; i<size; i++) data[i] = Math.random()*2 - 1;
  return noiseBuffer;
}

// Soft, cute key sound — more like a bubbly pop than a harsh clack
function keyClack(type){
  try{
    ensureAudio();
    const t = audioCtx.currentTime;
    const hit = type === 'hit';

    // Noise pop
    const src = audioCtx.createBufferSource();
    src.buffer = getNoiseBuffer();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = hit ? (3200 + Math.random()*800) : (1200 + Math.random()*300);
    filter.Q.value = hit ? 1.8 : 1.0;
    const noiseGain = audioCtx.createGain();
    const peak = hit ? 0.10 : 0.04;
    noiseGain.gain.setValueAtTime(peak, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);
    src.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
    src.start(t); src.stop(t + 0.04);

    // Bubbly pop tone
    const pop = audioCtx.createOscillator();
    const pGain = audioCtx.createGain();
    pop.type = 'sine';
    pop.frequency.setValueAtTime(hit ? (880 + Math.random()*200) : 440, t);
    pop.frequency.exponentialRampToValueAtTime(hit ? 600 : 300, t + 0.06);
    pGain.gain.setValueAtTime(hit ? 0.08 : 0.03, t);
    pGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
    pop.connect(pGain); pGain.connect(audioCtx.destination);
    pop.start(t); pop.stop(t + 0.07);
  } catch(e){}
}

// Cheerful success jingle
function playSuccess(){
  try{
    ensureAudio();
    const t = audioCtx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5-E5-G5-C6
    notes.forEach((freq, i) => {
      const start = t + i*0.06;
      const dur = 0.3;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(0.09, start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(start); osc.stop(start + dur + 0.02);
    });
    // Warm bass
    const bass = audioCtx.createOscillator();
    const bgain = audioCtx.createGain();
    bass.type = 'sine'; bass.frequency.value = 130.81;
    bgain.gain.setValueAtTime(0.0001, t);
    bgain.gain.linearRampToValueAtTime(0.05, t + 0.01);
    bgain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
    bass.connect(bgain); bgain.connect(audioCtx.destination);
    bass.start(t); bass.stop(t + 0.37);
  } catch(e){}
}

// ---------- Floating Particles System ----------
const particles = [];
const PARTICLE_COUNT = 60;
const PARTICLE_COLORS = [
  'rgba(247,151,30,', 'rgba(255,107,157,', 'rgba(196,113,237,',
  'rgba(86,217,182,', 'rgba(110,198,255,', 'rgba(255,210,0,'
];
function initParticles(){
  for(let i=0; i<PARTICLE_COUNT; i++){
    particles.push(createParticle());
  }
}
function createParticle(fromBottom){
  return {
    x: Math.random()*W,
    y: fromBottom ? H+10 : Math.random()*H,
    vx: (Math.random()-0.5)*0.3,
    vy: -(0.15 + Math.random()*0.4),
    size: 1.5 + Math.random()*3,
    alpha: 0.15 + Math.random()*0.35,
    color: PARTICLE_COLORS[Math.floor(Math.random()*PARTICLE_COLORS.length)],
    pulse: Math.random()*Math.PI*2,
    pulseSpeed: 0.5 + Math.random()*1.5,
  };
}
function updateAndDrawParticles(dt){
  ctx.save();
  for(let i=0; i<particles.length; i++){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.pulse += p.pulseSpeed * dt;
    const a = p.alpha * (0.5 + 0.5*Math.sin(p.pulse));
    const s = p.size * (0.8 + 0.2*Math.sin(p.pulse));

    ctx.fillStyle = p.color + a + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, s, 0, Math.PI*2);
    ctx.fill();

    // Soft glow
    ctx.fillStyle = p.color + (a*0.3) + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, s*3, 0, Math.PI*2);
    ctx.fill();

    if(p.y < -20 || p.x < -20 || p.x > W+20){
      particles[i] = createParticle(true);
    }
  }
  ctx.restore();
}

// ---------- Sparkle System (on hit) ----------
const sparkles = [];
function spawnSparkles(x, y, count, color){
  for(let i=0; i<count; i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 60 + Math.random()*180;
    sparkles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 40,
      life: 0.5 + Math.random()*0.5,
      maxLife: 0.5 + Math.random()*0.5,
      size: 2 + Math.random()*3,
      color: color || PARTICLE_COLORS[Math.floor(Math.random()*PARTICLE_COLORS.length)],
      rotation: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*10,
    });
  }
}
function updateAndDrawSparkles(dt){
  ctx.save();
  for(let i=sparkles.length-1; i>=0; i--){
    const s = sparkles[i];
    s.x += s.vx*dt;
    s.y += s.vy*dt;
    s.vy += 200*dt; // gravity
    s.life -= dt;
    s.rotation += s.rotSpeed*dt;
    if(s.life <= 0){ sparkles.splice(i,1); continue; }

    const a = s.life / s.maxLife;
    const sz = s.size * a;

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);

    // Star shape
    ctx.fillStyle = s.color + a + ')';
    ctx.beginPath();
    for(let p=0; p<4; p++){
      const ang = (p/4)*Math.PI*2;
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(ang)*sz, Math.sin(ang)*sz);
      ctx.lineTo(Math.cos(ang+0.3)*sz*0.4, Math.sin(ang+0.3)*sz*0.4);
    }
    ctx.fill();

    // Glow
    ctx.fillStyle = s.color + (a*0.2) + ')';
    ctx.beginPath();
    ctx.arc(0, 0, sz*2.5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }
  ctx.restore();
}

// ---------- Confetti System (on word complete) ----------
const confetti = [];
function spawnConfetti(x, y){
  const colors = ['rgba(255,107,157,','rgba(196,113,237,','rgba(247,151,30,','rgba(86,217,182,','rgba(110,198,255,','rgba(255,210,0,'];
  for(let i=0; i<30; i++){
    const angle = -Math.PI/2 + (Math.random()-0.5)*Math.PI*1.2;
    const speed = 150 + Math.random()*300;
    confetti.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1.0 + Math.random()*0.8,
      maxLife: 1.0 + Math.random()*0.8,
      w: 4 + Math.random()*6,
      h: 3 + Math.random()*4,
      color: colors[Math.floor(Math.random()*colors.length)],
      rotation: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*12,
    });
  }
}
function updateAndDrawConfetti(dt){
  ctx.save();
  for(let i=confetti.length-1; i>=0; i--){
    const c = confetti[i];
    c.x += c.vx*dt;
    c.y += c.vy*dt;
    c.vy += 320*dt;
    c.vx *= 0.99;
    c.life -= dt;
    c.rotation += c.rotSpeed*dt;
    if(c.life <= 0){ confetti.splice(i,1); continue; }

    const a = Math.min(1, c.life / (c.maxLife*0.3));
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.fillStyle = c.color + a + ')';
    ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h);
    ctx.restore();
  }
  ctx.restore();
}

// ---------- Global State ----------
const state = {
  tempo: 1.0,
  targetTempo: 1.0,
  combo: 0,
  maxCombo: 0,
  wordsCompleted: 0,
  wordsMissed: 0,
  glitch: 0,
  frozenUntil: 0,
  screenShake: 0,
  shakeX: 0,
  shakeY: 0,
  bgHue: 0, // slowly rotating bg accent
};

// ---------- Word Pool ----------
const WORD_POOL = [
  'SES','YOL','ANI','TON','GÜÇ','HIZ','KAÇ','TUŞ','SIR','AŞK','GÖZ','KOL','ISI','ZİL','TAŞ','KUM','SAZ',
  'ATEŞ','IŞIK','ODAK','AKIŞ','NOTA','RÜYA','PEÇE','TREN','KAPI','ÇARK','UYUM','DOKU','SIRT','İVME','DOLU','KATI','SIVI','AĞIR',
  'RİTİM','DENGE','ZAMAN','NABIZ','GÜNEŞ','BULUT','ÇEVİK','TEMPO','NEFES','YÜZEY','DALGA','DUMAN','GÖLGE','KİLİT','DÜĞÜM','ÇİZGİ','PARÇA','AKORT','EKRAN','KABLO','DÜZEN','ANLAM','YANKI','DÖNGÜ','HAFİF','VURUŞ'
];
const MS_PER_LETTER = 620;

let word = null;
let nextSpawnAt = performance.now() + 600;

function spawnWord(){
  const raw = WORD_POOL[Math.floor(Math.random()*WORD_POOL.length)];
  const letters = raw.split('');
  word = {
    letters,
    index: 0,
    spawnedAt: performance.now(),
    duration: letters.length * MS_PER_LETTER,
    boxes: letters.map(() => ({ wrongFlash: 0, pressFlash: 0, bounceY: 0 })),
    enterAnim: 0,
  };
}

// ---------- Feedback ----------
const logEl = document.getElementById('log');
function logLine(text, cls){
  const line = document.createElement('div');
  line.innerHTML = `<span class="${cls}">${text}</span>`;
  logEl.prepend(line);
  while (logEl.childNodes.length > 6) logEl.removeChild(logEl.lastChild);
}

const comboEl = document.getElementById('combo');
const streakEl = document.getElementById('streak-fire');
function updateHud(){
  comboEl.textContent = `COMBO ${state.combo}`;
  comboEl.classList.add('pop');
  setTimeout(()=> comboEl.classList.remove('pop'), 150);

  document.getElementById('tempo').textContent = `${Math.round(state.tempo*100)}%`;
  const total = state.wordsCompleted + state.wordsMissed;
  const acc = total ? Math.round((state.wordsCompleted/total)*100) : null;
  document.getElementById('acc').textContent = acc===null ? '—' : acc+'%';

  // Fire streak indicator
  if(state.combo >= 5){
    streakEl.classList.add('show');
    streakEl.textContent = state.combo >= 15 ? '🌟' : state.combo >= 10 ? '💥' : '🔥';
  } else {
    streakEl.classList.remove('show');
  }
}

function wordCenter(){
  return { x: CX, y: CY + 10 };
}

function completeWord(){
  const c = wordCenter();
  state.combo += 1;
  if(state.combo > state.maxCombo) state.maxCombo = state.combo;
  state.wordsCompleted += 1;
  state.targetTempo = Math.min(1.15, 1.0 + state.combo * 0.015);
  playSuccess();
  spawnConfetti(c.x, c.y);
  spawnSparkles(c.x, c.y, 20);
  logLine(`✨ TAMAM '${word.letters.join('')}'  +combo ${state.combo}`, 'hit');
  updateHud();
  word = null;
  nextSpawnAt = performance.now() + 480;
}

function missWord(reason){
  state.combo = 0;
  state.wordsMissed += 1;
  state.glitch = 0.25;
  state.screenShake = 0.3;
  state.targetTempo = Math.max(0.7, state.tempo - 0.1);
  state.frozenUntil = performance.now() + 220;
  logLine(`💔 KAÇTI '${word.letters.join('')}'  (${reason})`, 'miss');
  updateHud();
  word = null;
  nextSpawnAt = performance.now() + 650;
}

window.addEventListener('keydown', (e) => {
  const key = e.key.toLocaleUpperCase('tr-TR');

  if (!word) return;
  if (performance.now() < state.frozenUntil) return;

  const expected = word.letters[word.index];
  if (key === expected){
    word.boxes[word.index].pressFlash = 1;
    word.boxes[word.index].bounceY = 1;
    word.index += 1;
    keyClack('hit');

    const c = wordCenter();
    const boxW = 48, gap = 12;
    const totalW = word.letters.length*boxW + (word.letters.length-1)*gap;
    const startX = c.x - totalW/2;
    const bx = startX + (word.index-1)*(boxW+gap) + boxW/2;
    spawnSparkles(bx, c.y, 6, PARTICLE_COLORS[Math.floor(Math.random()*PARTICLE_COLORS.length)]);

    if (word.index >= word.letters.length){
      completeWord();
    }
  } else if (/^[A-ZÇĞİÖŞÜ]$/.test(key)) {
    word.boxes[word.index].wrongFlash = 1;
    state.screenShake = 0.12;
    keyClack('wrong');
  }
});

// ---------- Drawing Helpers ----------
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ---------- Cute Keycap Drawing ----------
function drawKeycap(cx, cy, w, h, label, tint, liftT, wrongFlash, bounceY){
  const liftRest = 8, liftPressed = 2;
  const lift = liftRest - (liftRest - liftPressed) * liftT;
  const r = 10;
  const bounce = Math.sin(bounceY * Math.PI) * -8;

  ctx.save();
  ctx.translate(cx, cy + bounce);

  // Soft shadow
  const shadowAlpha = 0.15 + 0.1*(1-liftT);
  ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
  ctx.beginPath();
  ctx.ellipse(0, h/2 + 6, w*0.45, 5, 0, 0, Math.PI*2);
  ctx.fill();

  const topY = -h/2 - lift;
  const frontH = Math.max(1, lift);
  const frontY = topY + h;

  // Front face with warm gradient
  roundRect(-w/2, frontY, w, frontH, 4);
  const completedGrad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  if (tint > 0.5) {
    completedGrad.addColorStop(0, '#6c5ce7');
    completedGrad.addColorStop(1, '#a29bfe');
  } else {
    completedGrad.addColorStop(0, '#2d3436');
    completedGrad.addColorStop(1, '#636e72');
  }
  ctx.fillStyle = completedGrad;
  ctx.fill();

  // Top face
  roundRect(-w/2, topY, w, h, r);

  if (tint > 0.5) {
    // Completed key — warm gradient
    const topGrad = ctx.createLinearGradient(-w/2, topY, w/2, topY+h);
    topGrad.addColorStop(0, '#a29bfe');
    topGrad.addColorStop(1, '#6c5ce7');
    ctx.fillStyle = topGrad;
    ctx.fill();
  } else if (tint > 0.3) {
    // Active key — glowing pink-orange
    const topGrad = ctx.createLinearGradient(-w/2, topY, w/2, topY+h);
    topGrad.addColorStop(0, '#ff9a76');
    topGrad.addColorStop(1, '#ff6b9d');
    ctx.fillStyle = topGrad;
    ctx.fill();

    // Pulsing glow
    ctx.shadowBlur = 18;
    ctx.shadowColor = 'rgba(255,107,157,0.6)';
    ctx.strokeStyle = 'rgba(255,107,157,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    // Inactive key — soft dark
    const topGrad = ctx.createLinearGradient(0, topY, 0, topY+h);
    topGrad.addColorStop(0, '#3d3d5c');
    topGrad.addColorStop(1, '#2d2d4a');
    ctx.fillStyle = topGrad;
    ctx.fill();
  }

  // Border
  ctx.lineWidth = 1;
  ctx.strokeStyle = tint > 0.5 ? 'rgba(162,155,254,0.5)' :
                    tint > 0.3 ? 'rgba(255,107,157,0.5)' :
                    'rgba(255,255,255,0.08)';
  ctx.stroke();

  // Wrong flash overlay
  if (wrongFlash > 0.02){
    roundRect(-w/2, topY, w, h, r);
    ctx.fillStyle = `rgba(255,71,87,${wrongFlash*0.4})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(255,71,87,${wrongFlash*0.8})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Top gloss highlight
  ctx.save();
  roundRect(-w/2+3, topY+2, w-6, h*0.35, 6);
  ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(-w/2, topY, w, h*0.35);
  ctx.restore();

  // Label
  ctx.font = `700 ${Math.round(h*0.38)}px 'Nunito', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if(tint > 0.5){
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(162,155,254,0.5)';
    ctx.shadowBlur = 6;
  } else if(tint > 0.3){
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(255,107,157,0.5)';
    ctx.shadowBlur = 8;
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
  }
  ctx.fillText(label, 0, topY + h/2 + 1);

  ctx.restore();
}

// ---------- Draw Word ----------
function drawWord(now, dt){
  if (!word) return;
  const c = wordCenter();

  // Entry animation
  word.enterAnim = Math.min(1, word.enterAnim + dt*4);
  const enterScale = 0.6 + 0.4 * easeOutBack(word.enterAnim);
  const enterAlpha = word.enterAnim;

  ctx.save();
  ctx.globalAlpha = enterAlpha;
  ctx.translate(c.x, c.y);
  ctx.scale(enterScale, enterScale);
  ctx.translate(-c.x, -c.y);

  // Ambient glow beneath the word
  const grd = ctx.createRadialGradient(c.x,c.y,0, c.x,c.y,200);
  grd.addColorStop(0, 'rgba(255,107,157,0.08)');
  grd.addColorStop(0.5, 'rgba(196,113,237,0.04)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(c.x,c.y,200,0,Math.PI*2); ctx.fill();

  const boxW = 48, gap = 12, boxH = 56;
  const totalW = word.letters.length*boxW + (word.letters.length-1)*gap;
  const startX = c.x - totalW/2;

  // Progress bar (gradient)
  const elapsed = (now - word.spawnedAt) * state.tempo;
  const remaining = Math.max(0, 1 - elapsed/word.duration);
  const barY = c.y + 50;
  const barH = 5;
  const barR = barH/2;

  // Bar background
  roundRect(startX, barY, totalW, barH, barR);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fill();

  // Bar fill
  if(totalW*remaining > 0){
    roundRect(startX, barY, totalW*remaining, barH, barR);
    if(remaining < 0.25){
      ctx.fillStyle = 'rgba(255,71,87,0.8)';
    } else {
      const barGrad = ctx.createLinearGradient(startX, 0, startX+totalW, 0);
      barGrad.addColorStop(0, '#ff6b9d');
      barGrad.addColorStop(0.5, '#c471ed');
      barGrad.addColorStop(1, '#f7971e');
      ctx.fillStyle = barGrad;
    }
    ctx.fill();

    // Bar glow
    ctx.shadowBlur = 8;
    ctx.shadowColor = remaining < 0.25 ? 'rgba(255,71,87,0.5)' : 'rgba(196,113,237,0.4)';
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Draw each letter keycap
  word.letters.forEach((letter, i) => {
    const bx = startX + i*(boxW+gap) + boxW/2;
    const box = word.boxes[i];
    box.wrongFlash = Math.max(0, box.wrongFlash - dt*3);
    box.pressFlash = Math.max(0, box.pressFlash - dt*5);
    box.bounceY = Math.max(0, box.bounceY - dt*4);

    let tint = 0, liftT = 0;
    if (i < word.index){ tint = 0.85; liftT = 0; }
    else if (i === word.index){ tint = 0.55; liftT = 0.15; }
    if (i === word.index - 1) liftT = Math.max(liftT, box.pressFlash);

    drawKeycap(bx, c.y, boxW, boxH, letter, tint, liftT, box.wrongFlash, box.bounceY);
  });

  ctx.restore();
}

function easeOutBack(t){
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

// ---------- Background Orbs ----------
const orbs = [];
function initOrbs(){
  const orbColors = [
    {r:247,g:151,b:30}, {r:255,g:107,b:157}, {r:196,g:113,b:237},
    {r:86,g:217,b:182}, {r:110,g:198,b:255}
  ];
  for(let i=0; i<5; i++){
    const c = orbColors[i];
    orbs.push({
      x: Math.random()*W,
      y: Math.random()*H,
      vx: (Math.random()-0.5)*0.4,
      vy: (Math.random()-0.5)*0.3,
      radius: 120 + Math.random()*180,
      color: c,
      phase: Math.random()*Math.PI*2,
    });
  }
}
function drawOrbs(now){
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for(const o of orbs){
    o.x += o.vx;
    o.y += o.vy;
    if(o.x < -o.radius) o.x = W+o.radius;
    if(o.x > W+o.radius) o.x = -o.radius;
    if(o.y < -o.radius) o.y = H+o.radius;
    if(o.y > H+o.radius) o.y = -o.radius;

    const pulse = 0.6 + 0.4*Math.sin(now/1000*0.5 + o.phase);
    const alpha = 0.025 * pulse;
    const grd = ctx.createRadialGradient(o.x,o.y,0, o.x,o.y,o.radius);
    grd.addColorStop(0, `rgba(${o.color.r},${o.color.g},${o.color.b},${alpha})`);
    grd.addColorStop(1, `rgba(${o.color.r},${o.color.g},${o.color.b},0)`);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(o.x,o.y,o.radius,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ---------- Soft Grid ----------
function drawGrid(){
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.015)';
  ctx.lineWidth = 1;
  const step = 50;
  for (let x=0; x<W; x+=step){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=step){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

// ---------- Screen Effects ----------
function drawGlitch(dt){
  if (state.glitch > 0){
    ctx.save();
    ctx.fillStyle = `rgba(255,71,87,${state.glitch*0.08})`;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
    state.glitch = Math.max(0, state.glitch - dt*2);
  }
}

function updateScreenShake(dt){
  if(state.screenShake > 0){
    state.shakeX = (Math.random()-0.5) * state.screenShake * 12;
    state.shakeY = (Math.random()-0.5) * state.screenShake * 12;
    state.screenShake = Math.max(0, state.screenShake - dt*3);
  } else {
    state.shakeX = 0;
    state.shakeY = 0;
  }
}

// ---------- Main Loop ----------
let lastT = performance.now();
initParticles();
initOrbs();

function loop(now){
  const dt = Math.min(0.05, (now - lastT)/1000);
  lastT = now;
  const frozen = now < state.frozenUntil;

  if (!frozen){
    state.tempo += (state.targetTempo - state.tempo) * dt * 1.5;
    if (!word && now >= nextSpawnAt) spawnWord();
    if (word){
      const elapsed = (now - word.spawnedAt) * state.tempo;
      if (elapsed >= word.duration) missWord('süre doldu');
    }
  }

  updateScreenShake(dt);

  ctx.save();
  ctx.translate(state.shakeX, state.shakeY);

  // Background
  const bgGrad = ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0, '#0f0c29');
  bgGrad.addColorStop(0.5, '#302b63');
  bgGrad.addColorStop(1, '#24243e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10,-10,W+20,H+20);

  drawOrbs(now);
  drawGrid();
  updateAndDrawParticles(dt);
  drawWord(now, frozen ? 0 : dt);
  updateAndDrawSparkles(dt);
  updateAndDrawConfetti(dt);
  drawGlitch(dt);

  ctx.restore();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
updateHud();
logLine('✨ sahne hazır — kelimeyi bar bitmeden yaz', 'hit');
</script>
